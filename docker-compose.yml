services:
  postgres:
    image: postgres:16
    container_name: coursetube-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - coursetube_postgres:/var/lib/postgresql/data

volumes:
  coursetube_postgres:
